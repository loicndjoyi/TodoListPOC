name: Deploy to Azure
on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Angular Frontend
        working-directory: ./client
        run: |
          npm ci
          npx ng build --configuration production

      - name: Copy Angular build to Web API wwwroot
        run: |
          mkdir -p ./src/TodoApp.Api/wwwroot
          cp -r ./client/dist/client/browser/* ./src/TodoApp.Api/wwwroot/

      - name: Publish .NET Backend
        run: dotnet publish ./src/TodoApp.Api -c Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
